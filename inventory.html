<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Never Had That • Inventory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');

        :root {
            --bg: #0f172a;
            --card: #1e2937;
            --accent: #22d3ee;
            --text: #e2e8f0;
            --text-light: #94a3b8;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
            font-size: 15px;
        }

        h1 {
            font-family: 'Press Start 2P', system-ui;
            text-align: center;
            font-size: 20px;
            margin: 0 0 8px;
            color: var(--accent);
        }

        .last-updated {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .note {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        button {
            background: #334155;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 220px;
            font-size: 14px;
        }

        button:hover {
            background: var(--accent);
            color: #0f172a;
            transform: translateY(-2px);
        }

        .product-list {
            margin-bottom: 30px;
        }

        .product-item {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            font-size: 16px;
        }

        .product-desc {
            font-size: 13px;
            color: var(--text-light);
        }

        .product-meta {
            font-size: 13px;
            color: var(--text-light);
        }

        .time-on-menu {
            font-size: 12px;
            color: #67e8f9;
            margin-top: 4px;
        }

        .retail-price {
            font-weight: 700;
            color: #67e8f9;
            font-size: 17px;
            margin-right: 12px;
        }

        .edit-btn {
            background: #22d3ee;
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .edit-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .line1, .line2 {
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
        }

        .line1 {
            grid-template-columns: 1fr 1fr;
        }

        .line2 {
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            font-weight: 500;
        }

        input, select {
            background: #0f172a;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px 10px;
            width: 100%;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
        }

        .live-retail {
            font-weight: 700;
            color: #67e8f9;
            font-size: 18px;
            text-align: center;
            padding: 10px 0;
            background: #0f172a;
            border-radius: 6px;
        }

        .card-actions {
            text-align: right;
            margin-top: 16px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .save-btn {
            background: #22d3ee;
            color: #0f172a;
            padding: 10px 24px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 10px 20px;
        }

        .result {
            margin-top: 30px;
            background: #1e2937;
            border-radius: 12px;
            padding: 20px;
            color: #67e8f9;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 320px;
            overflow: auto;
            border: 1px solid #334155;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>NEVER HAD THAT</h1>
    <div id="lastUpdated" class="last-updated">Last Updated: Never</div>
    <p class="note">Inventory Manager • Compact List + Expand to Edit</p>

    <div class="controls">
        <button onclick="addRow()">+ Add New Item</button>
        <button onclick="importFile()">📥 Import JSON</button>
        <button onclick="exportFile()">📤 Export JSON</button>
        <button onclick="copyMenuData()">📋 Copy Menu Data</button>
    </div>

    <div id="productList" class="product-list"></div>

    <div id="output" class="result"></div>

    <p class="footer-note">Tap Edit to change details • Retail & Markup update live</p>

    <input type="file" id="fileInput" accept=".json" style="display:none;">

    <script>
        let data = [];
        let lastUpdated = null;

        const rarityMarkup = {
            "Common Flower": 100,
            "Mid-Tier Flower": 120,
            "Small Batch Flower": 150,
            "Rare Flower": 180,
            "Exclusive Flower": 220,
            "Pre-Roll": 250,
            "Edible": 200,
            "Concentrate/Hash": 160,
            "VAPE": 180
        };

        function updateLastUpdated() {
            lastUpdated = new Date();
            document.getElementById('lastUpdated').textContent = `Last Updated: ${lastUpdated.toLocaleString()}`;
        }

        function daysAgo(dateStr) {
            if (!dateStr) return "just added";
            const diff = Math.floor((new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24));
            if (diff === 0) return "just added";
            if (diff === 1) return "1 day";
            return diff + " days";
        }

        function renderList() {
            const container = document.getElementById('productList');
            container.innerHTML = '';

            data.forEach((row, i) => {
                const retail = Math.round(row.wholesale * (1 + (row.markup || 120) / 100));

                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="product-info">
                        <div class="product-name">${row.name || 'Unnamed Item'}</div>
                        <div class="product-desc">${row.desc || ''}</div>
                        <div class="product-meta">${row.grower || ''} • ${row.category}</div>
                        <div class="time-on-menu">On menu: ${daysAgo(row.addedDate)}</div>
                    </div>
                    <div style="text-align:right; min-width: 90px;">
                        <div class="retail-price">$${retail}</div>
                        <div style="font-size:13px;color:#94a3b8;">Stock: ${row.inventory || 0}</div>
                        <button class="edit-btn" onclick="editItem(${i}); event.stopImmediatePropagation();">Edit</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function editItem(index) {
            const row = data[index];
            document.querySelectorAll('.edit-card').forEach(c => c.remove());

            const card = document.createElement('div');
            card.className = 'edit-card';
            card.id = `edit-card-${index}`;

            card.innerHTML = `
                <div class="line1">
                    <div>
                        <label>Category</label>
                        <select onchange="updateCell(${index}, 'category', this.value); refreshLiveFields(${index});">
                            <option value="FLOWER" ${row.category==='FLOWER'?'selected':''}>FLOWER</option>
                            <option value="HASH" ${row.category==='HASH'?'selected':''}>HASH</option>
                            <option value="EDIBLE" ${row.category==='EDIBLE'?'selected':''}>EDIBLE</option>
                            <option value="BONUS" ${row.category==='BONUS'?'selected':''}>BONUS</option>
                            <option value="VAPE" ${row.category==='VAPE'?'selected':''}>VAPE</option>
                        </select>
                    </div>
                    <div>
                        <label>Product</label>
                        <input value="${row.name || ''}" onchange="updateCell(${index}, 'name', this.value)">
                    </div>
                    <div style="grid-column: span 2;">
                        <label>Description</label>
                        <input value="${row.desc || ''}" onchange="updateCell(${index}, 'desc', this.value)">
                    </div>
                    <div>
                        <label>Grower</label>
                        <input value="${row.grower || ''}" onchange="updateCell(${index}, 'grower', this.value)">
                    </div>
                </div>

                <div class="line2">
                    <div>
                        <label>Rarity</label>
                        <select onchange="setRarity(${index}, this.value); refreshLiveFields(${index});">
                            ${Object.keys(rarityMarkup).map(r => 
                                `<option value="${r}" ${row.rarity===r?'selected':''}>${r}</option>`
                            ).join('')}
                        </select>
                    </div>
                    <div>
                        <label>Wholesale $</label>
                        <input type="number" id="wholesale-input-${index}" value="${row.wholesale || 0}" onchange="updateCell(${index}, 'wholesale', Number(this.value)); refreshLiveFields(${index});">
                    </div>
                    <div>
                        <label>Markup %</label>
                        <input type="number" id="markup-input-${index}" value="${row.markup || 120}" onchange="updateCell(${index}, 'markup', Number(this.value)); refreshLiveFields(${index});">
                    </div>
                    <div>
                        <label>Retail $</label>
                        <div id="live-retail-${index}" class="live-retail">$${Math.round((row.wholesale || 0) * (1 + ((row.markup || 120) / 100)))}</div>
                    </div>
                    <div>
                        <label>Stock</label>
                        <input type="number" value="${row.inventory || 0}" onchange="updateCell(${index}, 'inventory', Number(this.value))">
                    </div>
                </div>

                <div style="font-size:12px;color:#64748b;margin:12px 0;">
                    Added: ${row.addedDate ? new Date(row.addedDate).toLocaleDateString() : 'just now'}
                </div>

                <div class="card-actions">
                    <button class="delete-btn" onclick="deleteItem(${index})">Delete Item</button>
                    <button class="save-btn" onclick="closeEdit(${index})">Save & Close</button>
                </div>
            `;

            const container = document.getElementById('productList');
            const productItem = container.children[index];
            if (productItem) {
                productItem.insertAdjacentElement('afterend', card);
                productItem.style.display = 'none';
            }
        }

        function refreshLiveFields(index) {
            const row = data[index];
            const wholesale = parseFloat(row.wholesale) || 0;
            const markup = parseFloat(row.markup) || 120;
            const retail = Math.round(wholesale * (1 + markup / 100));

            const markupInput = document.getElementById(`markup-input-${index}`);
            if (markupInput) markupInput.value = markup;

            const retailEl = document.getElementById(`live-retail-${index}`);
            if (retailEl) retailEl.textContent = `$${retail}`;
        }

        function closeEdit(index) {
            const card = document.getElementById(`edit-card-${index}`);
            if (card) card.remove();

            const container = document.getElementById('productList');
            if (container.children[index]) {
                container.children[index].style.display = 'flex';
            }

            renderList();
            updateLastUpdated();
        }

        function deleteItem(index) {
            if (!confirm("Delete this item permanently?")) return;

            data.splice(index, 1);
            const card = document.getElementById(`edit-card-${index}`);
            if (card) card.remove();

            renderList();
            updateLastUpdated();
        }

        function updateCell(index, field, value) {
            data[index][field] = value;
            updateLastUpdated();
            refreshLiveFields(index);
        }

        function setRarity(index, rarity) {
            data[index].rarity = rarity;
            data[index].markup = rarityMarkup[rarity] || 120;
            updateLastUpdated();
            refreshLiveFields(index);
        }

        function addRow() {
            data.push({
                category: "FLOWER",
                name: "",
                desc: "",
                grower: "",
                rarity: "Mid-Tier Flower",
                wholesale: 0,
                markup: 120,
                retail: 0,
                inventory: 0,
                addedDate: new Date().toISOString()
            });
            renderList();
            updateLastUpdated();
        }

        function importFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    data = imported.data || imported;
                    data.forEach(item => {
                        if (!item.addedDate) item.addedDate = new Date().toISOString();
                    });
                    lastUpdated = imported.lastUpdated ? new Date(imported.lastUpdated) : new Date();
                    renderList();
                    updateLastUpdated();
                    alert("✅ Inventory loaded!");
                } catch(err) {
                    alert("Error loading file.");
                }
            };
            reader.readAsText(file);
        });

        function exportFile() {
            if (data.length === 0) return alert("No data to export.");

            const exportData = {
                lastUpdated: new Date().toISOString(),
                data: data
            };

            const jsonStr = JSON.stringify(exportData, null, 2);
            const dateStr = new Date().toISOString().slice(0,10);
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `never-had-that-inventory-${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyMenuData() {
            if (data.length === 0) return alert("Add some items first!");

            let output = "/* PASTE THIS INTO YOUR MAIN MENU HTML */\n\n";
            const categories = {};

            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            Object.keys(categories).forEach(cat => {
                output += `// ${cat}\n`;
                categories[cat].forEach(item => {
                    const retail = Math.round(item.wholesale * (1 + (item.markup || 120) / 100));
                    output += `addToCart(event, this, '${item.name}', ${retail}, '${item.grower}', '${item.desc}')\n`;
                });
                output += "\n";
            });

            document.getElementById('output').textContent = output;
            navigator.clipboard.writeText(output).then(() => {
                alert("✅ Menu data copied!\nPaste it into your main menu HTML.");
            });
        }

        window.onload = () => {
            renderList();
            document.getElementById('lastUpdated').textContent = "Last Updated: Never";
        };
    </script>
</body>
</html>
