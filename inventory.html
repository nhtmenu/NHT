<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Never Had That • Inventory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');

        :root {
            --bg: #0f172a;
            --card: #1e2937;
            --accent: #22d3ee;
            --text: #e2e8f0;
            --text-light: #94a3b8;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
            font-size: 15px;
        }

        h1 {
            font-family: 'Press Start 2P', system-ui;
            text-align: center;
            font-size: 20px;
            margin: 0 0 8px;
            color: var(--accent);
        }

        .last-updated {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .note {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        button {
            background: #334155;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 220px;
            font-size: 14px;
        }

        button:hover {
            background: var(--accent);
            color: #0f172a;
            transform: translateY(-2px);
        }

        .item-row {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 16px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .item-row:hover {
            box-shadow: 0 10px 15px -3px rgba(34, 211, 238, 0.2);
        }

        .line1, .line2 {
            display: grid;
            gap: 12px;
            margin-bottom: 12px;
        }

        .line1 {
            grid-template-columns: 1fr 1fr;
        }

        .line2 {
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            font-weight: 500;
        }

        input, select {
            background: #0f172a;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px 10px;
            width: 100%;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
        }

        .retail {
            font-weight: 700;
            color: #67e8f9;
            font-size: 16px;
            text-align: center;
            padding-top: 8px;
        }

        .result {
            margin-top: 30px;
            background: #1e2937;
            border-radius: 12px;
            padding: 20px;
            color: #67e8f9;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 320px;
            overflow: auto;
            border: 1px solid #334155;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>NEVER HAD THAT</h1>
    <div id="lastUpdated" class="last-updated">Last Updated: Never</div>
    <p class="note">Inventory Manager • Clean & Readable</p>

    <div class="controls">
        <button onclick="addRow()">+ Add New Item</button>
        <button onclick="importFile()">📥 Import JSON</button>
        <button onclick="exportFile()">📤 Export JSON</button>
        <button onclick="copyMenuData()">📋 Copy Menu Data</button>
    </div>

    <div id="itemsContainer"></div>

    <div id="output" class="result"></div>

    <p class="footer-note">Tip: Change Rarity to instantly update markup & retail price</p>

    <input type="file" id="fileInput" accept=".json" style="display:none;">

    <script>
        let data = [];
        let lastUpdated = null;

        const rarityMarkup = {
            "Common Flower": 100,
            "Mid-Tier Flower": 120,
            "Small Batch Flower": 150,
            "Rare Flower": 180,
            "Exclusive Flower": 220,
            "Pre-Roll": 250,
            "Edible": 200,
            "Concentrate/Hash": 160
        };

        function updateLastUpdated() {
            lastUpdated = new Date();
            const display = document.getElementById('lastUpdated');
            display.textContent = `Last Updated: ${lastUpdated.toLocaleString()}`;
        }

        function addRow() {
            data.push({
                category: "FLOWER",
                name: "",
                desc: "",
                grower: "",
                rarity: "Mid-Tier Flower",
                wholesale: 0,
                markup: 120,
                retail: 0,
                inventory: 0
            });
            renderItems();
            updateLastUpdated();
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            data.forEach((row, i) => {
                const retail = Math.round(row.wholesale * (1 + row.markup / 100));
                row.retail = retail;

                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `
                    <div class="line1">
                        <div>
                            <label>Category</label>
                            <select onchange="updateCell(${i}, 'category', this.value)">
                                <option value="FLOWER" ${row.category==='FLOWER'?'selected':''}>FLOWER</option>
                                <option value="HASH" ${row.category==='HASH'?'selected':''}>HASH</option>
                                <option value="EDIBLE" ${row.category==='EDIBLE'?'selected':''}>EDIBLE</option>
                                <option value="BONUS" ${row.category==='BONUS'?'selected':''}>BONUS</option>
                            </select>
                        </div>
                        <div>
                            <label>Product</label>
                            <input value="${row.name}" onchange="updateCell(${i}, 'name', this.value)">
                        </div>
                        <div style="grid-column: span 2;">
                            <label>Description</label>
                            <input value="${row.desc}" onchange="updateCell(${i}, 'desc', this.value)">
                        </div>
                        <div>
                            <label>Grower</label>
                            <input value="${row.grower}" onchange="updateCell(${i}, 'grower', this.value)">
                        </div>
                    </div>

                    <div class="line2">
                        <div>
                            <label>Rarity</label>
                            <select onchange="setRarity(${i}, this.value)">
                                ${Object.keys(rarityMarkup).map(r => 
                                    `<option value="${r}" ${row.rarity===r?'selected':''}>${r}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div>
                            <label>Wholesale $</label>
                            <input type="number" value="${row.wholesale}" onchange="updateCell(${i}, 'wholesale', Number(this.value))">
                        </div>
                        <div>
                            <label>Markup %</label>
                            <input type="number" value="${row.markup}" onchange="updateCell(${i}, 'markup', Number(this.value))">
                        </div>
                        <div>
                            <label>Retail $</label>
                            <div class="retail">$${row.retail}</div>
                        </div>
                        <div>
                            <label>Stock</label>
                            <input type="number" value="${row.inventory}" onchange="updateCell(${i}, 'inventory', Number(this.value))">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateCell(index, field, value) {
            data[index][field] = value;
            renderItems();
            updateLastUpdated();
        }

        function setRarity(index, rarity) {
            data[index].rarity = rarity;
            data[index].markup = rarityMarkup[rarity] || 120;
            renderItems();
            updateLastUpdated();
        }

        function importFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    data = imported.data || imported; // support old format too
                    lastUpdated = imported.lastUpdated ? new Date(imported.lastUpdated) : new Date();
                    renderItems();
                    updateLastUpdated();
                    alert("✅ Inventory loaded!");
                } catch(err) {
                    alert("Error loading file.");
                }
            };
            reader.readAsText(file);
        });

        function exportFile() {
            if (data.length === 0) return alert("No data to export.");

            const exportData = {
                lastUpdated: new Date().toISOString(),
                data: data
            };

            const jsonStr = JSON.stringify(exportData, null, 2);
            const dateStr = new Date().toISOString().slice(0,10); // YYYY-MM-DD
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `never-had-that-inventory-${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyMenuData() {
            if (data.length === 0) return alert("Add some items first!");

            let output = "/* PASTE THIS INTO YOUR MAIN MENU HTML */\n\n";
            const categories = {};

            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            Object.keys(categories).forEach(cat => {
                output += `// ${cat}\n`;
                categories[cat].forEach(item => {
                    output += `addToCart(event, this, '${item.name}', ${item.retail}, '${item.grower}', '${item.desc}')\n`;
                });
                output += "\n";
            });

            document.getElementById('output').textContent = output;
            navigator.clipboard.writeText(output).then(() => {
                alert("✅ Menu data copied!\nPaste it into your main menu HTML.");
            });
        }

        window.onload = () => {
            renderItems();
            // If no previous date, show "Never"
            document.getElementById('lastUpdated').textContent = "Last Updated: Never";
        };
    </script>
</body>
</html>
