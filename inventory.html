<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEVER HAD THAT - Inventory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #000080;
            color: #ffff00;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
        }
        
        h1 {
            text-align: center;
            font-size: 18px;
            margin: 10px 0 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #c0c0c0;
            color: #000;
            font-size: 13px;
        }
        
        th, td {
            padding: 10px 6px;
            border: 2px solid #000080;
            text-align: left;
            vertical-align: top;
        }
        
        th {
            background: #0000ff;
            color: #ffff00;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        input, select {
            width: 100%;
            padding: 6px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 13px;
            box-sizing: border-box;
        }
        
        button {
            background: #ff0000;
            color: #ffff00;
            border: 4px solid #ffffff;
            padding: 12px 16px;
            font-family: 'Press Start 2P';
            font-size: 14px;
            cursor: pointer;
            margin: 8px 4px;
            width: 100%;
            max-width: 300px;
        }
        
        button:hover {
            background: #ffff00;
            color: #000080;
        }
        
        .controls {
            text-align: center;
            margin: 15px 0;
        }
        
        .result {
            background: #000;
            color: #00ff00;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-size: 12px;
            max-height: 300px;
            overflow: auto;
        }
        
        .note {
            font-size: 11px;
            color: #ffff00;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>NEVER HAD THAT<br>INVENTORY TRACKER</h1>
    <p class="note">Start empty → Add items → Export when done</p>

    <div class="controls">
        <button onclick="addRow()">+ Add New Item</button>
        <button onclick="importFile()">📥 Import JSON</button>
        <button onclick="exportFile()">📤 Export JSON</button>
        <button onclick="copyMenuData()">📋 Copy Menu Data</button>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Category</th>
                <th>Product</th>
                <th>Description</th>
                <th>Grower</th>
                <th>Rarity</th>
                <th>Wholesale $</th>
                <th>Markup %</th>
                <th>Retail $</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="output" class="result"></div>

    <input type="file" id="fileInput" accept=".json" style="display:none;">

    <script>
        let data = [];

        const rarityMarkup = {
            "Common Flower": 100,
            "Mid-Tier Flower": 120,
            "Small Batch Flower": 150,
            "Rare Flower": 180,
            "Exclusive Flower": 220,
            "Pre-Roll": 250,
            "Edible": 200,
            "Concentrate/Hash": 160
        };

        function addRow() {
            data.push({
                category: "FLOWER",
                name: "",
                desc: "",
                grower: "",
                rarity: "Mid-Tier Flower",
                wholesale: 0,
                markup: 120,
                retail: 0,
                inventory: 0
            });
            renderTable();
        }

        function renderTable() {
            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = '';

            data.forEach((row, i) => {
                const retail = Math.round(row.wholesale * (1 + row.markup / 100));
                row.retail = retail;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><select onchange="updateCell(${i}, 'category', this.value)">
                        <option value="FLOWER" ${row.category==='FLOWER'?'selected':''}>FLOWER</option>
                        <option value="HASH" ${row.category==='HASH'?'selected':''}>HASH</option>
                        <option value="EDIBLE" ${row.category==='EDIBLE'?'selected':''}>EDIBLE</option>
                        <option value="BONUS" ${row.category==='BONUS'?'selected':''}>BONUS</option>
                    </select></td>
                    <td><input value="${row.name}" onchange="updateCell(${i}, 'name', this.value)"></td>
                    <td><input value="${row.desc}" onchange="updateCell(${i}, 'desc', this.value)"></td>
                    <td><input value="${row.grower}" onchange="updateCell(${i}, 'grower', this.value)"></td>
                    <td>
                        <select onchange="setRarity(${i}, this.value)">
                            ${Object.keys(rarityMarkup).map(r => 
                                `<option value="${r}" ${row.rarity===r?'selected':''}>${r}</option>`
                            ).join('')}
                        </select>
                    </td>
                    <td><input type="number" value="${row.wholesale}" onchange="updateCell(${i}, 'wholesale', Number(this.value))"></td>
                    <td><input type="number" value="${row.markup}" onchange="updateCell(${i}, 'markup', Number(this.value))"></td>
                    <td style="font-weight:bold; color:#000080;">$${row.retail}</td>
                    <td><input type="number" value="${row.inventory}" onchange="updateCell(${i}, 'inventory', Number(this.value))"></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateCell(index, field, value) {
            data[index][field] = value;
            renderTable();
        }

        function setRarity(index, rarity) {
            data[index].rarity = rarity;
            data[index].markup = rarityMarkup[rarity] || 120;
            renderTable();
        }

        function importFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    data = JSON.parse(ev.target.result);
                    renderTable();
                    alert("✅ Inventory loaded successfully!");
                } catch(err) {
                    alert("Error loading file. Make sure it's a valid JSON.");
                }
            };
            reader.readAsText(file);
        });

        function exportFile() {
            if (data.length === 0) {
                alert("No data to export yet.");
                return;
            }
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'never-had-that-inventory.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyMenuData() {
            if (data.length === 0) {
                alert("Add some items first!");
                return;
            }

            let output = "/* PASTE THIS INTO YOUR MAIN MENU HTML */\n\n";
            const categories = {};

            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            Object.keys(categories).forEach(cat => {
                output += `// ${cat}\n`;
                categories[cat].forEach(item => {
                    output += `addToCart(event, this, '${item.name}', ${item.retail}, '${item.grower}', '${item.desc}')\n`;
                });
                output += "\n";
            });

            document.getElementById('output').textContent = output;
            navigator.clipboard.writeText(output).then(() => {
                alert("✅ Menu data copied to clipboard!\n\nPaste into your main menu HTML where the addToCart lines are.");
            });
        }

        // Start completely empty
        window.onload = () => {
            renderTable();
        };
    </script>
</body>
</html>
